services:
  postgres:
    image: postgres:16-alpine
    container_name: transit_postgres
    restart: always
    environment:
      POSTGRES_USER: transit_user
      POSTGRES_PASSWORD: transit_password_secure_2026
      POSTGRES_DB: transit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: transit_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: